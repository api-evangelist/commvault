specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Commvault
providerId: commvault
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Backup
  - Data Protection
description: 'FOCUS-aligned FinOps for Commvault: per-user/month and per-TB/month meters across SaaS workload
  protection, plus quote-based Operational/Autonomous/Cyber Recovery software bundles. Volume discounts
  apply at common thresholds (50+ units or 750+ users).'
sources:
  - https://www.commvault.com/saas-pricing
  - https://www.commvault.com/packaging
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Commvault Systems, Inc.
serviceCategory: Data Protection
billingModel:
  pricingCategory: Pay-As-You-Go + Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
    - Refund
    - Credit
focusColumns:
  ServiceName: Commvault Cloud
  ServiceCategory: Data Protection
  ProviderName: Commvault
  PublisherName: Commvault Systems, Inc.
  InvoiceIssuerName: Commvault Systems, Inc.
  BillingCurrency: USD
meters:
  - name: protected_users
    unit: seat-month
    aggregation: sum
    dimensions:
      - workload
      - tier
  - name: protected_capacity
    unit: TB-month
    aggregation: sum
    dimensions:
      - workload
      - tier
      - region
  - name: protected_vms
    unit: vm-month
    aggregation: sum
    dimensions:
      - hypervisor
  - name: archive_capacity
    unit: TB-month
    aggregation: sum
    dimensions:
      - storage_class
  - name: software_subscription
    unit: month
    aggregation: sum
    dimensions:
      - bundle
      - entitlement
principles:
  - name: Visibility
    description: Use the Commvault Cloud usage / metering reports to track protected users and TBs by
      workload; reconcile against the CommServe inventory.
  - name: Allocation
    description: Tag clients/subclients with business unit, application, and environment so backup spend
      can be charged back.
  - name: Optimization
    description: Tier cold data into File & Object Archive ($900/100 TB/month vs $58.50/TB for active);
      decommission unused VMs from 10-packs; consolidate users across M365 tiers; cross volume thresholds
      (50+ units or 750+ users) to unlock volume discounts.
  - name: Accountability
    description: Backup admin owns retention policies; data owner approves protection scope; finance owns
      annual subscription renewal.
maintainers:
