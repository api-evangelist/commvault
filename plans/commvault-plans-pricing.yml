specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Commvault
providerId: commvault
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Backup
  - Data Protection
  - Cyber Recovery
  - SaaS
description: Commvault Cloud is sold both as enterprise software (Operational Recovery, Autonomous Recovery,
  Cyber Recovery — quoted by sales) and as Commvault Cloud SaaS with per-user/month or per-TB/month meters
  by workload (M365, Salesforce, Dynamics 365, Endpoint, VMs, Kubernetes, databases, file/object). Volume
  discounts apply at typical thresholds (50+ units or 750+ users).
sources:
  - https://www.commvault.com/saas-pricing
  - https://www.commvault.com/packaging
plans:
  - id: commvault-saas-m365
    name: SaaS — Microsoft 365 Backup
    type: usage-based
    description: Per-user/month protection for Microsoft 365 mailboxes, OneDrive, SharePoint, Teams.
    entries:
      - label: Standard tier (per user/month)
        name: m365_standard
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '1.70'
        userMultiplied: true
      - label: Enterprise w/Compliance (per user/month)
        name: m365_enterprise_compliance
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '4.50'
        userMultiplied: true
    elements:
      - name: Microsoft 365 backup
      - name: Compliance options at top tier
  - id: commvault-saas-salesforce
    name: SaaS — Salesforce Backup
    type: usage-based
    description: Per-user/month Salesforce metadata + data backup.
    entries:
      - label: Per user/month
        name: salesforce_user
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '3.60'
        userMultiplied: true
    elements:
      - name: Salesforce metadata + data backup
  - id: commvault-saas-dynamics
    name: SaaS — Dynamics 365 Backup
    type: usage-based
    description: Per-user/month Dynamics 365 backup.
    entries:
      - label: Per user/month
        name: dynamics_user
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '3.60'
        userMultiplied: true
    elements:
      - name: Dynamics 365 backup
  - id: commvault-saas-endpoint
    name: SaaS — Endpoint Backup
    type: usage-based
    description: Per-user/month endpoint (laptop/desktop) backup.
    entries:
      - label: Essentials (per user/month)
        name: endpoint_essentials
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '7.50'
        userMultiplied: true
    elements:
      - name: Endpoint backup
  - id: commvault-saas-vm
    name: SaaS — Virtual Machine Backup
    type: usage-based
    description: Sold as 10-VM packs per month.
    entries:
      - label: VM 10-pack/month
        name: vm_10_pack
        type: subscription
        metric: 10-vm-pack
        limit: -1
        timeFrame: month
        geo: global
        unit: 10
        price: '102.49'
        userMultiplied: false
    elements:
      - name: Virtual machine backup
  - id: commvault-saas-kubernetes
    name: SaaS — Kubernetes Backup
    type: usage-based
    description: Per-TB/month Kubernetes data protection.
    entries:
      - label: Per TB/month
        name: k8s_tb
        type: metered
        metric: TB
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '90.00'
        userMultiplied: false
    elements:
      - name: Kubernetes backup
  - id: commvault-saas-database
    name: SaaS — Database Backup
    type: usage-based
    description: Per-TB/month database backup; starts at $90/TB/month.
    entries:
      - label: Per TB/month
        name: db_tb
        type: metered
        metric: TB
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '90.00'
        userMultiplied: false
    elements:
      - name: Database backup
  - id: commvault-saas-file-object
    name: SaaS — File & Object Backup
    type: usage-based
    description: Per-TB/month file and object backup; starts at $58.50/TB/month.
    entries:
      - label: Per TB/month
        name: file_object_tb
        type: metered
        metric: TB
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '58.50'
        userMultiplied: false
