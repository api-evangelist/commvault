  - id: commvault-saas-archive
    name: SaaS — File & Object Archive
    type: usage-based
    description: Long-term archive priced per 100 TB/month.
    entries:
      - label: Per 100 TB/month
        name: archive_100tb
        type: metered
        metric: 100-TB
        limit: -1
        timeFrame: month
        geo: global
        unit: 100
        price: '900.00'
        userMultiplied: false
    elements:
      - name: File and object archive
  - id: commvault-software-operational
    name: Operational Recovery (Software)
    type: enterprise
    description: Quote-based enterprise software bundle covering immutable storage, encryption, metering,
      and unified management.
    entries:
      - label: Custom contract
        name: operational_custom
        type: subscription
        metric: contract
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Zero-trust architecture
      - name: Immutable storage
      - name: Metering & reporting
  - id: commvault-software-autonomous
    name: Autonomous Recovery (Software)
    type: enterprise
    description: Quote-based bundle adding cost-optimized recovery, replication, LiveSync, automated failover,
      app validation.
    entries:
      - label: Custom contract
        name: autonomous_custom
        type: subscription
        metric: contract
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: LiveSync replication
      - name: Automated failover/failback
      - name: Application recovery validation
  - id: commvault-software-cyber
    name: Cyber Recovery (Software)
    type: enterprise
    description: Quote-based bundle adding sensitive-data discovery, access governance, risk discovery,
      automated remediation, cyber deception.
    entries:
      - label: Custom contract
        name: cyber_custom
        type: subscription
        metric: contract
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Sensitive data discovery
      - name: Cyber deception & early warning
      - name: Automated risk remediation
